<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Capture d'écran du lecteur de chapitre Baiboly Malagasy</title>
  <desc id="desc">Lecteur affichant Genesisy chapitre 1 avec les boutons de navigation, les versets et la commande de copie.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="760"><stop stop-color="#102a43"/><stop offset="1" stop-color="#1f4e79"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#061829" flood-opacity="0.34"/></filter>
  </defs>
  <rect width="1200" height="760" rx="34" fill="url(#bg)"/>
  <rect x="54" y="42" width="1092" height="676" rx="30" fill="#0f2235" filter="url(#shadow)"/>
  <rect x="54" y="42" width="1092" height="88" rx="30" fill="#152f49"/>
  <text x="98" y="96" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#dff1ff">✝ Ny Baiboly</text>
  <text x="270" y="97" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#88a9c6">Malagasy Bible</text>
  <rect x="410" y="64" width="392" height="44" rx="22" fill="#0e2133" stroke="#294c6d"/>
  <text x="438" y="92" font-family="Inter, Arial, sans-serif" font-size="16" fill="#88a9c6">Hikaroka (3+ litera)...</text>
  <rect x="1014" y="62" width="84" height="46" rx="23" fill="#4a9edd"/>
  <text x="1039" y="91" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#071827">Boky</text>

  <rect x="90" y="166" width="220" height="500" rx="24" fill="#142b42" stroke="#284b69"/>
  <text x="120" y="214" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#dff1ff">Tantara</text>
  <rect x="120" y="244" width="160" height="56" rx="16" fill="#203e5a"/>
  <text x="140" y="278" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#bde4ff">Genesisy 1</text>
  <rect x="120" y="316" width="160" height="56" rx="16" fill="#162f48"/>
  <text x="140" y="350" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#8fb0ca">Matio 5</text>

  <rect x="350" y="166" width="760" height="94" rx="24" fill="#173552" stroke="#2c5579"/>
  <text x="638" y="222" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="900" fill="#eaf7ff">← Genesisy 1 →</text>
  <text x="962" y="222" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#9fc5e4">← Safidio ny toko</text>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="350" y="292" width="760" height="112" rx="22" fill="#f9fcff"/>
    <text x="382" y="333" font-size="15" font-weight="800" fill="#4a9edd">[Ny namoronan'Andriamanitra izao tontolo izao]</text>
    <circle cx="386" cy="368" r="17" fill="#e8f4ff"/><text x="381" y="374" font-size="15" font-weight="800" fill="#17496f">1</text>
    <text x="420" y="373" font-size="18" fill="#20384d">Tamin'ny voalohany Andriamanitra nahary ny lanitra sy ny tany.</text>
    <rect x="1010" y="342" width="64" height="38" rx="19" fill="#edf7ff"/><text x="1028" y="367" font-size="18" fill="#17496f">⧉</text>

    <rect x="350" y="426" width="760" height="92" rx="22" fill="#f9fcff"/>
    <circle cx="386" cy="472" r="17" fill="#e8f4ff"/><text x="381" y="478" font-size="15" font-weight="800" fill="#17496f">2</text>
    <text x="420" y="477" font-size="18" fill="#20384d">Ary ny tany dia tsy nisy endrika sady foana...</text>
    <rect x="1010" y="454" width="64" height="38" rx="19" fill="#edf7ff"/><text x="1028" y="479" font-size="18" fill="#17496f">⧉</text>

    <rect x="350" y="540" width="760" height="92" rx="22" fill="#f9fcff"/>
    <circle cx="386" cy="586" r="17" fill="#e8f4ff"/><text x="381" y="592" font-size="15" font-weight="800" fill="#17496f">3</text>
    <text x="420" y="591" font-size="18" fill="#20384d">Ary Andriamanitra nanao hoe: Misia mazava; dia nisy mazava.</text>
    <rect x="1010" y="568" width="64" height="38" rx="19" fill="#edf7ff"/><text x="1028" y="593" font-size="18" fill="#17496f">⧉</text>
  </g>
</svg>
